name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript (Lint + Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
        working-directory: .
      - run: npx prettier --check "src/**/*.{ts,tsx}" "tests/**/*.{ts,tsx}"
      - run: npm run type-check
      - run: npm run lint
      - run: npm run test -- --coverage

  python:
    name: Python (Lint + Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/analysis
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/analysis/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .
      - run: mypy src/ --ignore-missing-imports
      - run: python -m pytest tests/ -v

  rust:
    name: Rust (Build + Test + Clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo build --workspace
      - run: cargo test --workspace
      - run: cargo clippy --workspace -- -D warnings

  backend:
    name: Backend (Lint + Test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: packages/backend/pyproject.toml
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: black --check .
      - run: python -m pytest tests/ -v --ignore=tests/unit/infrastructure/test_stripe_subscription_gate.py --ignore=tests/unit/infrastructure/test_stripe_webhook_handler.py

  architecture-guard:
    name: Clean Architecture Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check architecture dependency rules
        run: bash scripts/check-architecture.sh
